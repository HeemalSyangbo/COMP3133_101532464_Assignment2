<div class="container" *ngIf="loading">
  <div class="text-center py-4">Loading employee details...</div>
</div>

<div class="container" *ngIf="employee">
  <h3 class="text-center mb-4">View Employee Details</h3>
  <div class="card border mx-auto" style="max-width: 520px">
    <div class="card-body p-4">
      <img
        [src]="employee.employee_photo"
        class="rounded mb-3"
        width="140"
        alt="employee photo"
        *ngIf="employee.employee_photo"
      />
      <p class="mb-1"><strong>First Name :</strong> {{ employee.first_name }}</p>
      <p class="mb-1"><strong>Last Name :</strong> {{ employee.last_name }}</p>
      <p class="mb-1"><strong>Email :</strong> {{ employee.email }}</p>
      <p class="mb-1"><strong>Designation :</strong> {{ employee.designation }}</p>
      <p class="mb-1"><strong>Department :</strong> {{ employee.department }}</p>
      <div class="mt-3">
        <a class="btn btn-success btn-sm me-2" [routerLink]="['/employees/edit', employee._id]">Update</a>
        <a class="btn btn-secondary btn-sm" routerLink="/employees">Back</a>
      </div>
    </div>
  </div>
</div>

<div class="container" *ngIf="!loading && errorMessage">
  <div class="alert alert-danger">{{ errorMessage }}</div>
</div>
