<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <a class="btn btn-primary btn-sm" routerLink="/employees/add">Add Employee</a>
    <h3 class="mb-0 text-center flex-grow-1">Employees List</h3>
    <span style="width: 88px"></span>
  </div>

  <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>
  <div class="text-center py-4" *ngIf="loading">Loading...</div>

  <div class="table-responsive bg-white border rounded p-2" *ngIf="!loading">
    <table class="table table-bordered table-sm align-middle mb-0">
      <thead>
        <tr>
          <th>Employee First Name</th>
          <th>Employee Last Name</th>
          <th>Employee Email</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let employee of employees">
          <td>{{ employee.first_name }}</td>
          <td>{{ employee.last_name }}</td>
          <td>{{ employee.email }}</td>
          <td class="text-nowrap">
            <a class="btn btn-sm btn-primary me-1" [routerLink]="['/employees', employee._id]">View</a>
            <a class="btn btn-sm btn-success me-1" [routerLink]="['/employees/edit', employee._id]">Update</a>
            <button class="btn btn-sm btn-danger" (click)="deleteEmployee(employee._id)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
