<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h3 class="mb-3">Login</h3>
          <p class="text-muted small">Use username or email to sign in.</p>

          <form [formGroup]="form" (ngSubmit)="submit()">
            <div class="mb-3">
              <label class="form-label">Username or Email</label>
              <input class="form-control" formControlName="identity" />
              <small class="text-danger" *ngIf="form.controls.identity.touched && form.controls.identity.errors?.['required']">
                Username or email is required.
              </small>
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" formControlName="password" />
              <small class="text-danger" *ngIf="form.controls.password.touched && form.controls.password.errors?.['required']">
                Password is required.
              </small>
              <small class="text-danger d-block" *ngIf="form.controls.password.touched && form.controls.password.errors?.['minlength']">
                Password must be at least 6 characters.
              </small>
            </div>

            <div class="alert alert-danger py-2" *ngIf="errorMessage">{{ errorMessage }}</div>

            <button class="btn btn-primary w-100" [disabled]="loading">
              {{ loading ? 'Logging in...' : 'Login' }}
            </button>
          </form>

          <p class="mt-3 mb-0 small">
            No account? <a routerLink="/signup">Create one</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
