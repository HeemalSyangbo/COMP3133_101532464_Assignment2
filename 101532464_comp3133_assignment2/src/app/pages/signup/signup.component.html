<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h3 class="mb-3">Signup</h3>
          <form [formGroup]="form" (ngSubmit)="submit()">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input class="form-control" formControlName="username" />
              <small class="text-danger" *ngIf="form.controls.username.touched && form.controls.username.errors?.['required']">
                Username is required.
              </small>
              <small class="text-danger d-block" *ngIf="form.controls.username.touched && form.controls.username.errors?.['minlength']">
                Username must be at least 3 characters.
              </small>
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input class="form-control" formControlName="email" />
              <small class="text-danger" *ngIf="form.controls.email.touched && form.controls.email.errors?.['required']">
                Email is required.
              </small>
              <small class="text-danger d-block" *ngIf="form.controls.email.touched && form.controls.email.errors?.['email']">
                Enter a valid email.
              </small>
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" formControlName="password" />
              <small class="text-danger" *ngIf="form.controls.password.touched && form.controls.password.errors?.['required']">
                Password is required.
              </small>
              <small class="text-danger d-block" *ngIf="form.controls.password.touched && form.controls.password.errors?.['minlength']">
                Password must be at least 6 characters.
              </small>
            </div>

            <div class="alert alert-danger py-2" *ngIf="errorMessage">{{ errorMessage }}</div>

            <button class="btn btn-success w-100" [disabled]="loading">
              {{ loading ? 'Creating...' : 'Create Account' }}
            </button>
          </form>

          <p class="mt-3 mb-0 small">
            Already have an account? <a routerLink="/login">Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
